<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 数据中心巡检系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-container">
        <!-- 侧边栏导航 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-server"></i>
                    <span>数据中心巡检</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">核心管理</div>
                    <ul>
                        <li class="active" data-page="dashboard">
                            <i class="fas fa-chart-pie"></i>
                            <span>仪表盘</span>
                            <span class="badge">3</span>
                        </li>
                        <li data-page="users">
                            <i class="fas fa-users"></i>
                            <span>用户管理</span>
                            <span class="badge">12</span>
                        </li>
                        <li data-page="rooms">
                            <i class="fas fa-building"></i>
                            <span>机房管理</span>
                        </li>
                        <li data-page="devices">
                            <i class="fas fa-microchip"></i>
                            <span>设备管理</span>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">巡检管理</div>
                    <ul>
                        <li data-page="inspections">
                            <i class="fas fa-clipboard-list"></i>
                            <span>巡检记录</span>
                            <span class="badge warning">5待处理</span>
                        </li>
                        <li data-page="reports">
                            <i class="fas fa-chart-bar"></i>
                            <span>统计报表</span>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">知识库</div>
                    <ul>
                        <li data-page="knowledge">
                            <i class="fas fa-book"></i>
                            <span>故障知识库</span>
                        </li>
                        <li data-page="documents">
                            <i class="fas fa-file-alt"></i>
                            <span>设备文档</span>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">系统设置</div>
                    <ul>
                        <li data-page="settings">
                            <i class="fas fa-cog"></i>
                            <span>系统配置</span>
                        </li>
                        <li data-page="logs">
                            <i class="fas fa-history"></i>
                            <span>操作日志</span>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        夏
                    </div>
                    <div class="user-details">
                        <div class="user-name">夏秀平</div>
                        <div class="user-role">系统管理员</div>
                    </div>
                </div>
                <div class="footer-actions" style="display: flex; gap: 10px;">
                    <a href="index.html" class="logout-btn" title="返回前台"
                        style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-home"></i>
                    </a>
                    <button id="logout-btn" class="logout-btn" title="退出登录">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 顶部导航栏 -->
            <header class="top-header">
                <button class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>

                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索用户、机房、设备...">
                </div>

                <div class="header-actions">
                    <button class="notification-btn">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </button>

                    <button class="fullscreen-btn" onclick="toggleFullscreen()">
                        <i class="fas fa-expand"></i>
                    </button>

                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="current-date"></span>
                    </div>
                </div>
            </header>

            <!-- 页面内容容器 -->
            <div class="page-container" id="page-container">
                <!-- 页面内容将通过JavaScript动态加载 -->
                <div class="loading">加载中...</div>
            </div>
        </main>
    </div>

    <!-- 用户管理模态框 -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>用户管理</h2>
                <button class="close-btn" onclick="closeModal('userModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <!-- 用户管理内容将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <!-- 机房管理模态框 -->
    <div id="roomModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>机房管理</h2>
                <button class="close-btn" onclick="closeModal('roomModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <!-- 机房管理内容将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <!-- 任务分配模态框 -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>任务分配</h2>
                <button class="close-btn" onclick="closeModal('taskModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <!-- 任务分配内容将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="notification" class="notification"></div>

    <script src="js/admin.js"></script>
</body>

</html>
